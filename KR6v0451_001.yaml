body:
  text: 清寒子雪岑撰大方廣佛華嚴經者斯乃諸佛之密藏如來之性海視之者莫識其旨歸挹之者罕測其涯際添性海之波瀾廓法界之疆域大乘頓教普被於無窮方廣真詮遐該於有識豈謂後五百歲忽奉金口之言娑婆境中俄啓珠函之祕無得而稱者其唯法界歟法界者一切衆生之身心本體也從本以來靈昭廓徹廣大虛寂唯一真境而已無有相貌而森羅大千無有邊而含容萬有昭昭於心目之間而相不可覩晃晃於色塵之內而理不可分非徹法之慧目離念之明智不能見自心如此之靈通也故世尊初成正覺歎曰奇哉我今普觀一切衆生具有如來智慧德相但以妄想執著而不能證得開示宗旨三復竭愚露滴天池喜合百川之味塵培華嶽無增萬仞之高極虛空之可度體無邊涯大也竭滄溟而可飲法門無盡方也碎塵剎而可數用無能測廣也離覺所覺朗萬法之幽邃佛也芬敷萬行榮耀衆德華也圓兹行德飾彼十身嚴也貫穿玄微以成真光之彩經也大哉真界萬法資始歟包空有而絶相入言象而無迹妙有得之而不有真空得之而不空生滅得之而真常緣起得之而交映我佛得之而妙踐真覺廓淨塵習寂寥於萬化之域動用於一虛之中融身剎而相含流聲光而遐燭我皇得之靈鑑虛極不有太虛曷展無涯之照不有真界豈淨等空之心諸佛心內衆生新新作佛衆生心中諸佛念念證真動千變而非多事理交徹而兩忘性相融通而無盡一字法門海墨書而不盡一毫之善空界盡而無窮語其定也冥一如於無心即萬動而恆寂海湛真智光含性空星羅法身影落心水圓音非扣而長演果海離念而心傳萬行忘照而齊修自晉譯微言則雙童現瑞唐翻至教則甘露呈祥冥衛昭然親紆御筆論成西域則地震光流志徹清涼則感通玄悟其書寫也則經輝五色楮香四達冬葵發艷瑞鳥銜花讀誦則渺然履空煥若臨鏡每含舍利適會神僧湧地現金色之身升天止修羅之陳觀行則無生入證偈讚排空海神𥊸而時雨滂沱天童迎而大水溺漫講説則華梵通韻人天共遵洪水斷流神光入宇良以一文之妙攝義無遺一偈之功能破地獄盥掌之水尚拯生靈讀誦思修功齊種智宿生何幸感遇斯文其事迹昭彰備於傳記山僧升于此座提唱華嚴大意或有問無邊剎境自他不隔於毫端既有自他因甚不隔答云懷州牛喫禾益州馬腹脹或問十世古今始終不離於當念既有始終因甚不離答云天下覓醫人灸豬左膊上進云此會翻宣教典勞説禪且望禪師直談教義答云山僧何曾有兩個舌頭或問一真法界十種玄門還有自他終始也無答云那得許多骨董來進云既無許多骨董畢竟華嚴所説何義答云説華嚴或問離却法界玄門華嚴經還在甚處答云現在諸人手裡進云與麼則見者聞者存者亡者皆得信受奉行去也答云贈汝三文買草鞋僧禮拜山僧答云禪客問禪囑山僧直談教義山僧只有一個舌頭禪客却有兩片耳朵如今曲順人情舉此且現成説話大衆一真法界無邊世界以俱收十種玄門無量法門而總攝即事即理即性即相即俗即真即因即果即主即伴即凡即聖即正即依即多即一如帝網珠重重顯現如香水海處處含容非神通使然乃法爾如是迷之者觸途成滯悟之者當處全彰這個是華嚴圓頓稱性之談也華嚴者吾世尊七處九會所談之經也七處九會者最初菩提場第二普光殿第三忉利天第四夜摩天第五兜率天第六他化天第七第八重會普光殿第九逝多林也第一會説如來依報正報第二會説十信第三會説十住第四會説十行第五會説十回向第六會説十地第七會説等覺妙覺如上七會并是次第而説謂之行布法門第八第九兩會普慧雲興二百問普賢瓶寫二千酬凡説一法則一切法總在裡許謂之圓融法門行布如桃花李花先花後果圓融如蓮花花果同時圓融又有二義一因該果海二果徹因源因該果海者舉十信時十住十行十回向十地等覺妙覺都在裡許果徹因源者舉等覺時十地十回向十行十住十信亦都在裡許所以道行布則教相差別圓融則性相無礙相是即性之相故行布不礙圓融性是即相之性故圓融不礙行布故則一為無量行布不礙圓融故則無量為一圓融不礙行布無量為一則融通隱隱一為無量則淺入重重如是九會之經共成八十卷也然此八十卷經分作四分謂之信解行證也最初有十一卷為衆生開發信門其次有四十一卷為衆生開發解門也又其次有七卷為衆生開發行門又其次有二十一卷為衆生開發證門一部大經不出信解行證四分四分所詮之義不出五周六相十玄門四法界也由信而解由解而行由行而證斯一經本末之大旨也一經大旨既而昭然然則兹所謂迷之者觸途成滯此義何耶此即當時二乘在座有耳不聞圓頓之教有眼不見舍那身者是也悟之者當處全彰此又何義耶此即現前諸山大德為某指示十種玄門顯揚一真法界者是也豈不見道華藏世界所有塵一一塵中見法界諸人還會麼即今山僧數珠頭上十種玄門開分也數珠下一真法界現了也恁麼見得便見盡虛空遍法界無盡光明功德藏身現在這裡佛剎微塵數菩薩海會亦在這裡佛剎微塵數諸善知識天龍八部亦在這裡佛剎微塵數寶座寶床寶網寶帳寶樹寶蓮寶華鬘纓絡亦在這裡佛剎微塵數香焰雲花焰雲燈焰雲摩尼雲獅子幢雲亦在這裡問也在這裡答也在這裡圓融也在這裡行布也在這裡信也在這裡解也在這裡行也在這裡證也在這裡彌勒彈指開樓閣門也在這裡文殊伸手摩善財頂也在這裡乃至五周六相十玄門四法界都在這裡此豈不是當處全彰者哉我今更為某向親切簡要處總而收之絶斷聖凡境界世尊七處我這裡只一處世尊九會我這裡只一會世尊説經八十卷我這裡只一句且道那個是一句了了見無一物亦無人亦無佛大千沙界海中漚一切賢聖如電拂其了則了畢竟向何處與某相見聽取一偈了心心了了無心當處全彰義轉深瀝瀆變為華藏海覺花開遍雜花林毗盧華藏莊嚴海遍在一切處大方廣佛華嚴經遍該一切法華藏海既遍一切處且道牛欄馬廄酒肆淫坊劒樹刀山鑊湯爐炭等穢惡境界又向何處安著既無安著處便將爐炭鑊湯刀山劒樹喚作華藏海得麼便將淫坊酒肆馬廄牛欄喚作華藏海得麼若不喚作華藏海則不可謂之遍在一切處也華嚴經既該一切法且道神號鬼哭水響風聲犬吠雞啼驢鳴馬叫等穢惡聲音又向何處分別既無分別處便將馬叫驢鳴雞啼犬吠喚作華嚴經得麼便將風聲水響鬼哭神號喚作華嚴經得麼若不喚作華嚴經則不可謂之遍該一切法也靈利丈夫英俊上士向這裡指點不出分踈不過山僧今日為某指點去也無量無數浮幢香水海無量無數世界輪圍山無量無數菩提解脫場無量無數摩尼寶光聚無量無數宮殿樓閣雲無量無數蓮花獅子座無量無數變化莊嚴身無量無數國城善知識即今山僧數珠頭上同時顯露了也教主遮那金口所説普賢願王菩薩所説文殊大智菩薩所説七處九會諸菩薩當會所説四十一位法身大士一切大心衆生天龍阿修羅等衆會所説地神説水神説火神説風神説山神説林神説樹神道場神等所説乃至雲臺説寶網説塵説剎説熾然説今日山僧數珠下同時舉揚了也且道數珠因甚如此奇特若知他奇特處便知他變現融通處若知他變融通處便知他變遍在一切處遍該一切處遍該一切法也恁麼見得方知神號鬼哭水響風聲犬吠雞啼驢鳴馬叫等無一法不是華嚴經也牛欄馬廄酒肆淫坊劒樹刀山鑊湯爐炭等無一處不是華藏海也此心未了則各相萬殊此心既了則體用一致了心三昧能如是不是了心人不知了了頓除佛祖見明明絶斷聖凡情靈臺不隱絲毫物妙用玄微盡掃除知識五十三員在儞眉毛眼睫上大經八十一卷在儞鼻孔口唇邊儞若要向眉毛眼睫上求則千里萬里蹉過了也儞若要向鼻孔口唇邊討則千差萬差打失了也豈不見道有大經卷在一塵中有一智人破此微塵出大經卷若見得這個大經那八十一卷都成間故紙又不見道真善知識不離自家道在己求不從他覓若見得這個知識那五十三員總是路傍人儞若未能恁麼承當却又不許等間放過八十一卷有始有終政好從頭讀去也五十三員有前有後不妨逐位參來所以經中道善知識者長諸善根譬如雪山長諸藥草善知識者是功德處譬如大海出生衆寶善知識者不染世法譬如蓮花不著於水善知識者不受諸惡譬如大海不宿死尸善知識者照明法界譬如盛日照四天下善知識者長菩薩身譬如父母養育兒子又云見善知識心不散亂見善知識破障礙山見善知識入大悲海救護衆生見善知識得智慧光普照法界見善知識普能覩見十方佛海見善知識得見諸佛轉於法輪又云由親近善知識能勇猛勤修一切智道由親近善知識能速疾出生諸大願海由親近善知識能代一切衆生受無量苦由親近善知識能於一微塵中説法聲遍法界由親近善知識於念念中行菩薩究竟安住一切智地由親近善知識而能遍往十方國土善哉善哉善知識者乃至如是之利益哉雖然如是要見善知識須有大因緣有因緣者千里相逢無因緣者當面蹉過優曇鉢花容易見大善知識最難逢此語豈欺人哉唯此某宿有大因緣多見善知識且如山僧固無長處某也曾納香問道求語策進來如今四大幻身雖曰已死向其求語問道之心昭昭靈靈明明了了兩眼對兩眼何曾有生死去來所謂真善知識不離自家既見外邊知識來參取自家知識去也某還會麼茫茫煙水百餘城誰肯隨人背後行腳未跨門相見了到家元不涉途程解盡見除功已畢更無玄妙可論量若人欲識佛境界當淨其意如虛空遠離妄想及諸趣令心所向皆無礙何謂佛境界也空有迭彰理事無礙一多相即小大互容夫是之謂佛境界也由是觀之一塵一毛皆佛境界一沙一滴皆佛境界一四天下一大千世界乃至佛剎微塵數華藏海皆佛境界也爭奈汝諸人舉手所指縱自所觀高而蓋者謂之天下而載者謂之地運而行者謂之日月列而布者謂之星辰靜而住者謂之山動而流者謂之水有情者謂之人無情者謂之物森羅者謂之萬像却將真佛境界當面諱却豈不大可憐哉此無他只是汝諸人意根下不曾清淨故有種種妄想既有妄想乃有分別乃有名相既有名相所拘於是見天只是天見地只是地見山水只是山水見人物只是人物矣又於名相之中妄生種種取著或取著山或取著水或取著人或取著物又於取著之中妄生種種障礙或被色礙或被聲礙或被山水人物萬像森羅之所障礙既是所向皆礙要見佛境界驢年更驢年雖然如是汝若端的要見也不難但將種種妄想種種取著種種障礙和盤掇轉直教意根下清淨如虛空向頂門上豁開正眼洞照世間然後天也是佛境界地也是佛境界日月星辰也是佛境界山川人物也是佛境界一塵一毛一沙一滴乃至佛剎微塵數世界海無往而非佛境界也當此之時和個妄想取著障礙直下皆是佛境界如是境界也非有也非空也非理也非事也非一也非多也非小也非大也非迷也非悟也非修也非證也喚作佛境界也得不喚作佛境界也得如是微妙不可説如是圓融不可説如是自在不可説如是無礙不可説如是利益不可説是名不可説又不可説之佛境界也恁麼則某平生所聞是佛境界平生所見是佛境界平生所樂是佛境界平生所參是佛境界某且道於佛境界還曾親到也無若也未到更𥊸從頭説破若人欲識佛境界頭上安頭當淨其意如虛空誰曾染污遠離妄想及諸趣撥波求水令心所向皆無礙滿目青山林中孤坐大巍巍六載方知苦行非野鵲不樔黃面頂雪山深處突雲飛世尊昔日摩竭陀國阿蘭若法菩提場中初成正覺智入三世悉皆平等其身充滿一切世間其音普順十方國土譬如虛空具含衆像於諸境界無所分別此是大開一口吞盡十方世界了也又復歎曰奇哉我今普觀一切衆生具有如來智慧德相但以妄想執看而不證得此又將菩提場中所證所得底盡情分付諸人了也汝諸人現在菩提場中人人頭戴虛空個個腳踏實地悟則妄想為菩提梵語菩提此翻曰覺欲成正覺者須發菩提心故經云菩提心者猶如種子能生一切諸佛法故菩提心者猶如大地能持一切諸世間故菩提心者猶如淨水能洗一切煩惱垢故菩提心者猶如大風普於世間無所礙故菩提心者猶如大車普能運載諸菩薩故菩提心者猶如大道普令得入大智城故菩提心者猶如舍宅安隱一切諸衆生故菩提心者猶如園林於中遊戲受法樂故菩提心者猶如慈父訓導一切諸菩薩故菩提心者猶如慈母生長一切諸菩薩故菩提心者猶如蓮花不染一切世間法故菩提心者猶如良藥能治一切煩惱病故菩提心者如如意珠周給一切諸貧乏故菩提心者如如意樹能雨一切莊嚴具故菩提心者如大施會能滿一切衆生心故菩提心者如佛支提一切世間應供養故善哉菩提心乃有如是之功德也既發菩提心當修菩薩行行若不修心成虛發某豈不見善財童子每參知識必曰我已先發阿耨多羅三藐三菩提心而我未知云何學菩薩行修菩薩道我問聖者善能誘誨願為我説此乃善財發心修行之樣子也由是而知雖有多聞若不修行與不聞等如人説食終不能飽故經云如人説美膳自餓而不食於法不修行多聞亦如是如人善方藥自疾不能救於法不修行多聞亦如是如人數他寶自無半錢分於法不修行多聞亦如是如聾奏音樂悅彼不自聞於法不修行多聞亦如是如盲繪衆像示彼不自見於法不修行多聞亦如是譬如海船師而於海中死於法不修行多聞亦如是恭惟某則不然一生所發都是菩提心一生所修都是菩薩行妄想執著念念遠離智慧德相時時體究其於當來世中蒙佛授記坐道場成正覺決定少他一分不得且道有何憑據經云初歡喜地菩薩多劫修行生於王宮此其證也滿散華嚴會山僧升座或問一法若有毗盧墮在凡夫萬法若無普賢失其境界畢竟如何和會答云儞在那裡見他廝鬪來進云爭奈前話何僧云某甲到這裏有耳如聾有眼如盲山僧云更要和會箇甚麼有僧云某甲會也山僧云你作麼生會僧云性空即是佛不可得思量山僧喝云三十年後思量者一喝在乃云遮那淨法身藏在一毛孔裡普賢行願海散在百草頭邊雖在一毛孔奈爭拄地撑天雖在百草頭畢竟掃蹤滅迹低聲低聲遮那與普賢來也諸人要見一毛孔麼答云橫亘十方竪窮三際諸人要見百草頭麼答云石火電光不容眨眼有時一毛孔重重吞却百草頭有時百草頭即是一毛孔直得遮那普賢輥作一片使無邊開士大地衆生討頭不著投身不入用力不到札腳不牢既無定體亦無定名有時喚作一真法界有時喚作大光明藏有時喚作法菩提場有時喚作妙莊嚴域有時喚作六相義有時喚作十玄門有時喚作一心三觀有時喚作直指單傳有時喚作故家田地有時喚作向上牢關或號金剛圈或名鐵餕餡或稱暗號子或曰本來人乃至用之為棒變之為喝放去收來千差萬別及乎盡底掀翻從頭勘破元來只是一個自己這個自己在天同天在地同地在人同人在物同物於自分上或説本具或説本空或説悟迷或説修證引起許多間絡索春色無高下花枝自長短只如某宿有資薰不肯昧却自己所以一出母胎便自靈利雖現如類身同行世間事其不昧者終自了然指廩損金不待勸而行矣誦經解義豈待教而通乎又能痛念生死事大力參禪門話頭日用功夫心心不間自己面目念念究明壽至天年臨終端然而逝既有賢父賢子為之廣作佛事又有孝女孝壻為之翻閲大經向普賢行願海中滿注八功德水就遮那淨法身上莊嚴萬行因華某自己一著可謂美矣善矣如今滿世間人皆不知有自己一著以其不知故不肯信以其不信故不能行只有富貴功名中酒色財氣上乾弄一生有何成就去死日不遠猶自不回頭豈不哀哉痛哉又有一等雖信自己雖曰參禪學道而用心不切不能勇猛精進也要口頭胡説亂道臘月三十日到來十箇有五雙虛生浪死其視某得無愧於心乎山僧只舉末會將一抱龜毛拂子攪翻華藏海曲順教家之情做箇座主模樣牽經引教忉忉怛怛要與某發揚自己一著而今看來發揚也發揚不著讚歎也讚歎不及徒爾間言長語弄成滿地葛藤且請大衆出來自家收拾去也諸人還會麼記得善財童子遍參南方五十三員善和識末後遇普賢菩薩教發十種願王引導往生樂土喚作一生參學事畢大小善財參方無眼目走得腳生瘡帶纍後人長年在途路爭似不出門庭遍參知識不離華藏海親見安養邦不待往生何煩引導敢保善財童子羡慕不及也某還會麼娑婆安養路無差了得心源共一家坐看重重香水海紫金光照白蓮花佛紀二千九百五十三年四月嶺北寺剎巡禮時尚州佛教堂布教師李雪翁和尚云梅月堂金時習即清寒子雪岑撰刊本華嚴釋題祕藏為寶年前法住寺徐震河和尚借去和尚借與宗教課渡邊彰尚今不返還榮州郡喜方寺住持李震雲許得雪岑撰華嚴釋題蓮經別讚靜明國師撰蓮經讚寫本合部一册而李雪翁許借鈔云梅月堂金時習李朝端宗時生六臣之一也悲觀世事無常入山為僧住於江原道雪嶽山五歲庵華嚴法界圖注十玄注華嚴釋題蓮經別讚各一卷撰也今讀此等書皆以禪教兩宗義理解釋理趣磊落可謂義龍禪虎一場同時躍動者也佛紀二九五三五月望鄉晃震記
